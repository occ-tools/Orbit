name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: orbit-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Node ${{ matrix.node }} · Linux
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - if: matrix.node == 24
        run: pnpm audit:prod
      - if: matrix.node == 24
        run: pnpm test:coverage:critical
      - if: matrix.node == 24
        name: Run real-browser Web UI smoke
        env:
          ORBIT_E2E_BROWSER_CHANNEL: chrome
        run: pnpm test:webui:e2e
      - if: matrix.node == 24
        run: pnpm smoke:cli
      - if: matrix.node == 24
        run: pnpm smoke:install
      - if: matrix.node == 24
        run: node scripts/verify-cli-package.mjs

  platform:
    name: Node 22 · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - run: pnpm smoke:cli
      - run: pnpm smoke:install
      - run: node scripts/verify-cli-package.mjs
