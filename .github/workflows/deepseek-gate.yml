name: DeepSeek release gate

on:
  workflow_dispatch:
    inputs:
      provider:
        description: Credentialed provider profile to test
        required: true
        default: deepseek
        type: choice
        options:
          - deepseek
          - tokendance
      extended:
        description: Run the isolated coding acceptance suite
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: orbit-deepseek-gate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deepseek:
    name: Real DeepSeek protocol and quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: deepseek-testing
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      TOKENDANCE_API_KEY: ${{ secrets.TOKENDANCE_API_KEY }}
      PROVIDER: ${{ inputs.provider }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @orbit-build/cli build
      - name: Require a dedicated low-privilege test credential
        shell: bash
        run: |
          if [[ "${PROVIDER}" == "deepseek" && -z "${DEEPSEEK_API_KEY}" ]]; then
            echo "::error::Configure DEEPSEEK_API_KEY in the protected deepseek-testing environment."
            exit 2
          fi
          if [[ "${PROVIDER}" == "tokendance" && -z "${TOKENDANCE_API_KEY}" ]]; then
            echo "::error::Configure TOKENDANCE_API_KEY in the protected deepseek-testing environment."
            exit 2
          fi
      - name: Probe provider protocol
        run: node packages/cli/dist/index.js --provider "${PROVIDER}" doctor --probe --deepseek --strict
      - name: Benchmark DeepSeek V4 Flash
        run: >-
          node packages/cli/dist/index.js --provider "${PROVIDER}" bench
          --model deepseek-v4-flash --thinking disabled --repeat 3
          --max-tokens 512 --max-first-delta-ms 5000
          --max-first-text-ms 12000 --min-throughput 15 --max-error-rate 0
      - name: Benchmark DeepSeek V4 Pro
        run: >-
          node packages/cli/dist/index.js --provider "${PROVIDER}" bench
          --model deepseek-v4-pro --thinking high --repeat 3
          --max-tokens 1024 --max-first-delta-ms 8000
          --max-first-text-ms 30000 --min-throughput 10 --max-error-rate 0
      - name: Run isolated coding acceptance suite
        if: inputs.extended
        run: >-
          node packages/cli/dist/index.js --provider "${PROVIDER}" eval
          evals/deepseek-v4.yaml --model deepseek-v4-pro --allow-commands --json
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: deepseek-gate-${{ github.run_id }}
          path: .orbit/benchmarks
          if-no-files-found: warn
          retention-days: 30
