name: Publish npm release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to verify and publish
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: orbit-npm-release
  cancel-in-progress: false

jobs:
  publish:
    name: Verify and publish @orbit-build/cli
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: npm-production
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Install an OIDC-capable npm CLI
        run: npm install --global npm@11.18.0 && npm --version
      - run: pnpm install --frozen-lockfile
      - name: Match the release tag to the package version
        shell: bash
        run: |
          version="$(node -p "require('./packages/cli/package.json').version")"
          test "${RELEASE_TAG}" = "v${version}"
      - run: pnpm verify:release
      - name: Pack the verified artifact
        id: pack
        shell: bash
        run: |
          version="$(node -p "require('./packages/cli/package.json').version")"
          filename="orbit-build-cli-${version}.tgz"
          npm pack ./packages/cli --silent
          test -f "${filename}"
          sha256sum "${filename}" > "${filename}.sha256"
          echo "filename=${filename}" >> "${GITHUB_OUTPUT}"
      - uses: actions/upload-artifact@v6
        with:
          name: orbit-cli-${{ env.RELEASE_TAG }}
          path: |
            ${{ steps.pack.outputs.filename }}
            ${{ steps.pack.outputs.filename }}.sha256
          if-no-files-found: error
          retention-days: 90
      - name: Publish the exact verified tarball with provenance
        run: npm publish "${{ steps.pack.outputs.filename }}" --access public --provenance
